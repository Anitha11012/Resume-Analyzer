version: "3.9"

services:

  resume-service:
    build: ./services/resume-service
    ports:
      - "5002:5002"

  analysis-service:
    build: ./services/analysis-service
    ports:
      - "5003:5003"

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "5000:5000"
    depends_on:
      - resume-service
      - analysis-service

  web:
    build: ./apps/web
    ports:
      - "5173:5173"